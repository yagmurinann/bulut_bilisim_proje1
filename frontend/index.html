<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulut Bilişim | Öğrenci Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .hero-bg {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 30px 20px;
        }

        .btn-custom {
            background-color: #3498db;
            color: white;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
            border: none;
        }

        .btn-custom:hover {
            background-color: #2980b9;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .table-hover tbody tr:hover {
            background-color: #f1f8ff;
            transition: 0.2s;
        }

        .badge-custom {
            background-color: #2c3e50;
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="hero-bg text-center">
                        <h2 class="mb-1">🚀 Bulut Bilişim Yönetim Paneli</h2>
                        <p class="mb-0 opacity-75">Çift Katmanlı Web Uygulaması (RESTful API)</p>
                    </div>

                    <div class="card-body text-center p-5">
                        <button class="btn btn-custom px-4 py-2 mb-4 shadow-sm" onclick="verileriGetir()" id="fetchBtn">
                            API'den Verileri Çek
                        </button>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle border">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Ad Soyad</th>
                                        <th>Bölüm</th>
                                    </tr>
                                </thead>
                                <tbody id="ogrenciListesi">
                                    <tr>
                                        <td colspan="3" class="text-muted py-4">Henüz veri çekilmedi. Lütfen butona
                                            tıklayınız.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function verileriGetir() {
            const btn = document.getElementById('fetchBtn');
            // Butona basılınca yükleniyor efekti verelim
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Yükleniyor...';
            btn.disabled = true;

            // Backend API'ye istek atıyoruz
            fetch('http://13.61.105.24:5000/api/ogrenciler')
                .then(response => response.json())
                .then(data => {
                    const liste = document.getElementById('ogrenciListesi');
                    liste.innerHTML = ''; // Eski yazıyı temizle

                    // Gelen veriyi tablo satırlarına (tr) dönüştür
                    data.forEach(ogrenci => {
                        let tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><span class="badge badge-custom">${ogrenci.id}</span></td>
                            <td class="fw-bold">${ogrenci.ad}</td>
                            <td>${ogrenci.bolum}</td>
                        `;
                        liste.appendChild(tr);
                    });

                    // Butonu eski haline getir
                    btn.innerHTML = 'Veriler Güncellendi ✔️';
                    setTimeout(() => {
                        btn.innerHTML = "API'den Verileri Çek";
                        btn.disabled = false;
                    }, 2000);
                })
                .catch(error => {
                    alert('Sunucuya bağlanılamadı. Backend API çalışıyor mu?');
                    btn.innerHTML = "API'den Verileri Çek";
                    btn.disabled = false;
                });
        }
    </script>
</body>

</html>
