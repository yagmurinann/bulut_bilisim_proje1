<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Bulut Hava Durumu Danışmanı</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e0f2f1;
            text-align: center;
            padding: 50px;
            color: #333;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            display: inline-block;
            min-width: 350px;
        }

        h2 {
            color: #00796b;
            margin-bottom: 20px;
        }

        input {
            padding: 12px;
            border: 2px solid #b2dfdb;
            border-radius: 8px;
            width: 220px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #00796b;
        }

        button {
            padding: 12px 25px;
            background: #00796b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #004d40;
        }

        #sonuc {
            margin-top: 30px;
            font-weight: 500;
            font-size: 18px;
        }

        .temp {
            font-size: 3em;
            font-weight: bold;
            color: #ff9800;
            margin: 10px 0;
        }

        .city-name {
            font-size: 1.5em;
            color: #004d40;
            font-weight: bold;
        }

        .advice {
            color: #d32f2f;
            margin-top: 15px;
            padding: 10px;
            background: #ffebee;
            border-radius: 8px;
            display: inline-block;
        }

        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #7f8c8d;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>🌦️ Bulut Hava Danışmanı</h2>
        <input type="text" id="sehirInput" placeholder="Şehir giriniz (Örn: Ankara)">
        <button onclick="havaGetir()">Sorgula</button>
        <div id="sonuc">
        </div>
        <div class="footer">
            <p>Ankara Üniversitesi - Bulut Bilişim Projesi</p>
        </div>
    </div>

    <script>
        async function havaGetir() {
            const sehir = document.getElementById('sehirInput').value;
            const sonucDiv = document.getElementById('sonuc');

            if (!sehir) {
                sonucDiv.innerHTML = "<p style='color:red;'>Lütfen bir şehir adı girin!</p>";
                return;
            }

            sonucDiv.innerHTML = "<p>Bulutlardan veri çekiliyor... ☁️</p>";

            try {

                const response = await fetch(`http://13.61.105.24:5000/api/hava?sehir=${sehir}`);
                const data = await response.json();

                if (data.hata) {
                    sonucDiv.innerHTML = `<p style="color: red;">❌ ${data.hata}</p>`;
                } else {
                    sonucDiv.innerHTML = `
                        <div class="city-name">${data.sehir}</div>
                        <div class="temp">${data.derece}°C</div>
                        <div>Durum: ${data.durum}</div>
                        <div class="advice">💡 ${data.tavsiye}</div>
                    `;
                }
            } catch (error) {
                sonucDiv.innerHTML = "<p style='color: red;'>⚠️ Sunucuya bağlanılamadı! Lütfen backend'in çalıştığından emin olun.</p>";
            }
        }
    </script>
</body>

</html>
